<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar • Vida Marinha</title>
  
  <style>
    /* Importando fonte moderna e profissional */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    /* Reset básico e configurações globais */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      /* Gradiente de fundo com tons de oceano */
      background: linear-gradient(135deg, #0a2533 0%, #0f3a4a 50%, #1e5f7a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0f2fe;
      position: relative;
      overflow: hidden;
    }

    /* Imagem de fundo sutil do oceano */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('https://www.institucional.europa.com.br/blog/wp-content/uploads/2019/05/mergulho-oceano-e1672075299217.jpg') center/cover no-repeat;
      opacity: 0.15;
      z-index: -1;
    }

    /* Container principal do formulário */
    .container {
      background: rgba(15, 37, 52, 0.92); /* Fundo semi-transparente */
      backdrop-filter: blur(20px);        /* Efeito de vidro fosco */
      border-radius: 24px;
      box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.6);
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
      border: 1px solid rgba(103, 232, 249, 0.2);
      position: relative;
      z-index: 2;
    }

    /* Logo e título */
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 700;
      color: #67e8f9;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    h2 {
      text-align: center;
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f0f9ff;
    }

    /* Texto descritivo abaixo do título */
    p.subtitle {
      text-align: center;
      color: #a5f3fc;
      margin-bottom: 40px;
      font-size: 15.5px;
    }

    /* Estilo dos campos do formulário */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14.5px;
      font-weight: 500;
      color: #bae6fd;
    }

    input {
      width: 100%;
      padding: 15px 20px;
      background: rgba(23, 55, 74, 0.85);
      border: 1px solid #4a9ab8;
      border-radius: 14px;
      color: #f0f9ff;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    /* Efeito ao focar nos inputs */
    input:focus {
      outline: none;
      border-color: #67e8f9;
      box-shadow: 0 0 0 4px rgba(103, 232, 249, 0.25);
      background: rgba(23, 55, 74, 0.95);
    }

    /* Botão de mostrar/ocultar senha */
    .toggle-password {
      position: absolute;
      right: 18px;
      top: 39px;
      cursor: pointer;
      color: #67e8f9;
      font-size: 20px;
    }

    /* Botão de login */
    .button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #22d3ee, #67e8f9);
      color: #0f2938;
      border: none;
      border-radius: 14px;
      font-size: 16.5px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px -5px rgba(103, 232, 249, 0.4);
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px -8px rgba(103, 232, 249, 0.5);
    }

    /* Mensagens de sucesso e erro */
    .message {
      margin-top: 16px;
      text-align: center;
      font-size: 14.5px;
      padding: 12px;
      border-radius: 10px;
      display: none;
    }

    .success { background: rgba(16, 185, 129, 0.2); color: #4ade80; }
    .error   { background: rgba(248, 113, 113, 0.2); color: #f87171; }

    /* Rodapé com links */
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 14.5px;
      color: #88d1e8;
    }

    .footer a {
      color: #67e8f9;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Cabeçalho com logo -->
    <div class="logo">
      <h1><span>🐠</span> Vida Marinha</h1>
    </div>
    
    <h2>Bem-vindo de volta</h2>
    <p class="subtitle">Explore o mundo submarino com segurança</p>

    <!-- Formulário de login -->
    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <!-- Botão para alternar visibilidade da senha -->
        <span class="toggle-password" id="togglePassword">👁️</span>
      </div>

      <button type="submit" class="button" id="loginBtn">ENTRAR</button>
    </form>

    <!-- Área para exibir mensagens de feedback -->
    <div id="message" class="message"></div>

    <!-- Links do rodapé -->
    <div class="footer">
      Não tem uma conta? <a href="#">Cadastre-se</a><br>
      <a href="#" style="font-size: 13px; margin-top: 8px; display: inline-block;">Esqueci minha senha</a>
    </div>
  </div>

  <script>
    // Selecionando elementos do DOM
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    const loginBtn = document.getElementById('loginBtn');
    const messageDiv = document.getElementById('message');

    // ==================== FUNCIONALIDADE: Mostrar / Ocultar Senha ====================
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      togglePassword.textContent = type === 'password' ? '👁️' : '🐋';
    });

    // ==================== FUNCIONALIDADE: Submissão do Formulário ====================
    form.addEventListener('submit', async (e) => {
      e.preventDefault(); // Impede o recarregamento da página

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      // Validação básica dos campos
      if (!email || !password) {
        showMessage('Por favor, preencha todos os campos.', 'error');
        return;
      }

      if (!email.includes('@')) {
        showMessage('Por favor, insira um e-mail válido.', 'error');
        return;
      }

      // Feedback visual de carregamento
      loginBtn.disabled = true;
      loginBtn.textContent = 'ENTRANDO...';

      try {
        // Simulação de requisição ao servidor (1400ms)
        await new Promise(resolve => setTimeout(resolve, 1400));

        // Simulação de login bem-sucedido
        if (password.length >= 6) {
          showMessage('Login realizado com sucesso! 🌊', 'success');
          
          setTimeout(() => {
            alert('Bem-vindo de volta ao Vida Marinha! 🐋');
            // window.location.href = "/dashboard.html"; // Redirecionamento futuro
          }, 900);
        } else {
          showMessage('Credenciais inválidas. Tente novamente.', 'error');
        }
      } catch (error) {
        showMessage('Erro de conexão. Verifique sua internet.', 'error');
      } finally {
        // Restaura o botão independentemente do resultado
        loginBtn.disabled = false;
        loginBtn.textContent = 'ENTRAR';
      }
    });

    // ==================== FUNÇÃO AUXILIAR: Exibir mensagens ====================
    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';

      // Esconde a mensagem automaticamente após 5 segundos
      setTimeout(() => {
        messageDiv.style.display = 'none';
      }, 5000);
    }
  </script>
</body>
</html>
