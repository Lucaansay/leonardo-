<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protegendo os Oceanos</title>
    <!-- Importando Chart.js para o gráfico -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background-color: #0056b3;
        }

        /* Estilo da Navbar */
        .sidebar {
            width: 250px;
            height: 100vh;
            /* Altura total da tela */
            background-color: #0f88ec;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #021385;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            padding: 15px 25px;
        }

        .sidebar ul li a {
            color: #021385;
            text-decoration: none;
            font-size: 18px;
            display: block;
            transition: 0.3s;
        }

        /* Efeito ao passar o mouse */
        .sidebar ul li:hover {
            background-color: #0400ff76;
        }

        .sidebar ul li a:hover {
            color: #fff;
            padding-left: 10px;
            /* Efeito de deslocamento */
        }


        /* Conteúdo Principal */
        .main-content {
            flex: 1;
            display: flex;
            margin-left: 250px;
            flex-direction: column;
            padding: 20px;
        }

        /* Header com Ícone de Menu */
        .header {
            margin-bottom: 20px;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* Grade Superior (Texto e Baleia) */
        .top-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .block {
            height: 300px;
            border: 2px solid #33a1fd;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .text-block {
            background-image: url('https://www.arquiprojeto.art.br/wp-content/uploads/2021/05/1_38_ggh7VMS88m1a2e4JjXQ-scaled.jpeg');
            /* Substitua aqui */
            background-color: #002b5c;
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .image-block {
            background-image: url('https://super.abril.com.br/wp-content/uploads/2019/02/baleia_site.png?w=720&h=440&crop=1');
        }

        /* Área do Gráfico */
        .chart-container {
            background-image: url('https://www.revistaea.org/img/acoesea52_files/image001.jpg');
            background-repeat: no-repeat;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            flex: 1;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        .main-content h1 {
            color: #ffffff;
            margin-left: 420px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <!-- Menu Lateral -->
    <nav class="sidebar">
        <h2>Menu</h2>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">dicas</a></li>
            <li><a href="#">Certificados</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <h1>Aquatic Life</h1>

        <section class="top-row">
            <div class="block text-block">
                Protegendo a vida nos oceanos
            </div>

            <div class="block image-block">
                <!-- A imagem entra via CSS background -->
            </div>
        </section>

        <div class="chart-container">
            
        </div>
    </main>


</body>

</html>
